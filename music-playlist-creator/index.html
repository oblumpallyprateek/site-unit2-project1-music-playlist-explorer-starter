<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Music Playlist Explorer</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Music Playlist Explorer</h1>
    </header>

    <main>
        <div class="playlist-cards">
        </div>
    </main>

    <footer>
        <p>Music Playlist Explorer 2026</p>
    </footer>

    <!-- Modal Overlay -->
    <div class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn">X</button>
            
            <img src="assets/img/playlist.png" alt="Playlist Cover">
            <h2>My Playlist</h2>
            <p>By Prateek</p>
            <p>Likes: 42</p>
            
            <button class="shuffle-btn">Shuffle</button>
            
            <h3>Songs:</h3>
            <ul>
                <li>
                    <p><strong>Locked out of Heaven</strong></p>
                    <p>Artist: Bruno Mars</p>
                    <p>Duration: 3:52</p>
                </li>
                <li>
                    <p><strong>Chicago</strong></p>
                    <p>Artist: Micheal Jackson</p>
                    <p>Duration: 4:00</p>
                </li>
                <li>
                    <p><strong>Losing It</strong></p>
                    <p>Artist: Fisher</p>
                    <p>Duration: 4:07</p>
                </li>
            </ul>
        </div>
    </div>

    <script src="data/data.js"></script>
    <script src="script.js"></script>
</body>
</html>
